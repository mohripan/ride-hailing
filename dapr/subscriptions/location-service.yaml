apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: location-driver-location-updated
spec:
  pubsubname: kafka-pubsub
  topic: driver.location.updated
  routes:
    default: /events/driver-location
  deadLetterTopic: dlq.driver.location.updated
  metadata:
    rawPayload: "true"
scopes:
  - location-service
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: location-driver-status-changed
spec:
  pubsubname: kafka-pubsub
  topic: driver.status.changed
  routes:
    default: /events/driver-status
  deadLetterTopic: dlq.driver.status.changed
  metadata:
    rawPayload: "true"
scopes:
  - location-service
