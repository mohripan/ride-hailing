apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: localhost:9092
    - name: authType
      value: none
scopes:
  - driver-service
  - rider-service
  - location-service
  - matching-service
  - trip-service
  - notification-service
